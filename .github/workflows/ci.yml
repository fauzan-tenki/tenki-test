name: CI - Tenki Runner Capability Test (2-lane, low-trust-safe)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
# Low-trust cap = 2 concurrent jobs, counted WORKSPACE-WIDE. cancel-in-progress
# keeps only one run's jobs in flight so overlapping runs can't sum past 2.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lane 1 of 2 - compute + I/O (sequential steps = ONE in-flight slot).
  compute-io:
    runs-on: tenki-local-macos-26-2c-4g
    timeout-minutes: 20
    steps:
      - name: System info
        run: |
          echo "::group::cpu"; nproc; lscpu 2>/dev/null | grep -E 'Model name|^CPU\(s\)' || true; echo "::endgroup::"
          echo "::group::mem"; free -h; echo "::endgroup::"
          echo "::group::disk"; df -hT; echo "::endgroup::"
          uname -a
      - name: Install bench tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq stress-ng sysbench fio
      - name: CPU - saturate all cores
        run: stress-ng --cpu 0 --cpu-method matrixprod --timeout 30s --metrics-brief
      - name: CPU - sysbench
        run: sysbench cpu --cpu-max-prime=20000 --threads=$(nproc) run | grep -E 'events per second|total time'
      - name: Memory - ~70 percent RAM
        run: stress-ng --vm 2 --vm-bytes 35% --timeout 30s --metrics-brief
      - name: Disk - sequential dd
        run: |
          dd if=/dev/zero of=tf bs=1M count=2048 oflag=direct 2>&1 || dd if=/dev/zero of=tf bs=1M count=2048 conv=fdatasync 2>&1
          sync; dd if=tf of=/dev/null bs=1M 2>&1; rm -f tf
      - name: Disk - random 4k (best-effort)
        run: fio --name=rw --rw=randrw --bs=4k --size=512M --numjobs=4 --runtime=20 --time_based --group_reporting --ioengine=psync || echo "::warning::fio unsupported on this fs"

  # Lane 2 of 2 - network + toolchains + containers + cache + artifacts.
  net-tools-containers:
    runs-on: tenki-local-macos-26-2c-4g
    timeout-minutes: 20
    steps:
      - name: Network latency (runner must reach github)
        run: curl -fsSL -o /dev/null -w 'dns=%{time_namelookup}s connect=%{time_connect}s total=%{time_total}s\n' https://github.com
      - name: Network throughput (non-fatal)
        run: |
          curl -fsSL -o /dev/null --max-time 120 -w 'downloaded=%{size_download}B speed=%{speed_download}B/s\n' https://proof.ovh.net/files/100Mb.dat \
            || curl -fsSL -o /dev/null --max-time 120 -w 'downloaded=%{size_download}B speed=%{speed_download}B/s\n' https://ash-speed.hetzner.com/100MB.bin \
            || echo "::warning::bandwidth probe failed; continuing"
      - uses: actions/setup-node@v4
        with: {node-version: "24"}
      - uses: actions/setup-go@v5
        with: {go-version: "1.24"}
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Toolchains
        run: node --version && go version && python --version
      - name: Docker + container (non-fatal; microVM runners may lack a daemon)
        run: |
          if docker version >/dev/null 2>&1; then
            printf 'FROM alpine:3.20\nCMD ["echo","hello from a tenki runner container"]\n' > Dockerfile
            docker build -t tenki-cap:${{ github.run_id }} . && docker run --rm tenki-cap:${{ github.run_id }}
          else
            echo "::warning::no docker daemon on this runner; skipping container test"
          fi
      - name: Cache round-trip
        run: mkdir -p ~/.cache/tenki && dd if=/dev/urandom of=~/.cache/tenki/blob bs=1M count=32
      - uses: actions/cache@v4
        with:
          path: ~/.cache/tenki
          key: tenki-cache-${{ github.run_id }}
          restore-keys: tenki-cache-
      - name: Artifact round-trip
        run: dd if=/dev/urandom of=art.bin bs=1M count=25 && sha256sum art.bin
      - uses: actions/upload-artifact@v4
        with: {name: cap-artifact, path: art.bin, retention-days: 1}